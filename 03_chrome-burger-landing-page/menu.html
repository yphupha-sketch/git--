<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chrome & Burger - Menu</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-white text-gray-800 font-sans">
    <header class="shadow-md">
      <div class="container mx-auto flex justify-between items-center p-4">
        <h1 class="text-2xl font-bold">Chrome & Burger</h1>
        <nav class="flex items-center space-x-6">
          <svg
            class="w-6 h-6 text-gray-800 dark:text-white"
            aria-hidden="true"
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            fill="none"
            viewBox="0 0 24 24"
          >
            <path
              stroke="currentColor"
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M12 21a9 9 0 1 1 0-18 9 9 0 0 1 0 18Zm0 0a8.949 8.949 0 0 0 4.951-1.488A3.987 3.987 0 0 0 13 16h-2a3.987 3.987 0 0 0-3.951 3.512A8.949 8.949 0 0 0 12 21Zm3-11a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"
            />
          </svg>
          <a href="index.html" class="text-gray-600 hover:text-blue-500"
            >Home</a
          >
          <a href="menu.html" class="text-gray-600 hover:text-blue-500">Menu</a>
          <a
            href="#"
            class="bg-blue-500 text-white px-4 py-2 rounded-md hover:bg-blue-600"
            >Order Now</a
          >
        </nav>
      </div>
    </header>

    <main class="container mx-auto p-4">
      <h1 class="text-4xl font-bold text-center my-12">Our Live Menu</h1>

      <section class="mb-16">
        <h2 class="text-2xl font-bold mb-6">From Supabase</h2>
        <div id="supabase-menu-container" class="grid md:grid-cols-3 gap-8 max-w-6xl mx-auto">
          <p class="text-gray-500 col-span-3">Loading...</p>
        </div>
      </section>

      <section>
        <h2 class="text-2xl font-bold mb-6">From MongoDB</h2>
        <div id="mongodb-menu-container" class="grid md:grid-cols-3 gap-8 max-w-6xl mx-auto">
          <p class="text-gray-500 col-span-3">Loading...</p>
        </div>
      </section>
    </main>

    <footer class="bg-gray-800 text-white text-center py-4">
      <p>&copy; 2025 Chrome & Burger. All rights reserved.</p>
    </footer>

    <script>
      const SUPABASE_URL = "https://chrome-burger-db-server.onrender.com/api/menu-items";
      const MONGODB_URL  = "https://chrome-burger-db-server.onrender.com/api/mongodb-menu-items";

      function renderMenuItems(items, containerId) {
        const container = document.getElementById(containerId);
        container.innerHTML = "";
        items.forEach((item) => {
          const el = document.createElement("div");
          el.classList.add("menu-item", "bg-yellow-400", "rounded-lg", "shadow-md", "overflow-hidden", "text-left");
          el.innerHTML = `
            <div class="p-4">
              <h4 class="text-2xl font-bold mb-2">${item.name}</h4>
              <p class="text-gray-800">${item.description}</p>
              <p class="text-gray-800 font-bold mt-2">$${item.price}</p>
            </div>
          `;
          container.appendChild(el);
        });
      }

      function showError(containerId, message) {
        document.getElementById(containerId).innerHTML =
          `<p class="text-red-600 col-span-3">${message}</p>`;
      }

      fetch(SUPABASE_URL)
        .then((r) => { if (!r.ok) throw new Error("Supabase fetch failed"); return r.json(); })
        .then((items) => renderMenuItems(items, "supabase-menu-container"))
        .catch(() => showError("supabase-menu-container", "Could not load Supabase menu items."));

      fetch(MONGODB_URL)
        .then((r) => { if (!r.ok) throw new Error("MongoDB fetch failed"); return r.json(); })
        .then((items) => renderMenuItems(items, "mongodb-menu-container"))
        .catch(() => showError("mongodb-menu-container", "Could not load MongoDB menu items."));
    </script>
  </body>
</html>
